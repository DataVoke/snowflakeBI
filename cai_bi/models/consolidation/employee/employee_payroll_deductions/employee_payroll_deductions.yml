        data_type: BOOLEAN
      - name: KEY
        data_type: VARCHAR(5000)
        data_tests:
          - not_null
          - unique
      - name: HASH_KEY
        data_type: VARCHAR(32)
        data_tests:
          - not_null
          - unique
      - name: LINK
        data_type: VARCHAR(5000)
