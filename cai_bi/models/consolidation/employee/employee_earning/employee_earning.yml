version: 1

models:
  - name: employee_earning
    description: Model for employee earning / paycheck information
    config:
      contract:
        enforced: true
    data_tests:
      - employee_earning_source_count_match
    columns:
      - name: SRC_SYS_KEY
        data_type: VARCHAR(250)
      - name: DTS_CREATED_AT
        data_type: TIMESTAMP_TZ(9)
      - name: CREATED_BY
        data_type: VARCHAR(250)
      - name: DTS_UPDATED_AT
        data_type: TIMESTAMP_TZ(9)
      - name: UPDATED_BY
        data_type: VARCHAR(250)
      - name: DTS_EFF_START
        data_type: TIMESTAMP_TZ(9)
      - name: DTS_EFF_END
        data_type: TIMESTAMP_TZ(9)
      - name: BLN_CURRENT
        data_type: BOOLEAN
      - name: KEY
        data_type: VARCHAR(5000)
        data_tests:
          - not_null
          - unique
      - name: HASH_KEY
        data_type: VARCHAR(32)
        data_tests:
          - not_null
          - unique
      - name: LINK
        data_type: VARCHAR(5000)
      - name: HASH_LINK
        data_type: VARCHAR(32)
      - name: KEY_COMPANY
        data_type: VARCHAR(5000)
      - name: HASH_KEY_COMPANY
        data_type: VARCHAR(32)
      - name: KEY_EMPLOYEE
        data_type: VARCHAR(5000)
      - name: HASH_KEY_EMPLOYEE
        data_type: VARCHAR(32)
      - name: KEY_EMPLOYMENT
        data_type: VARCHAR(5000)
      - name: HASH_KEY_EMPLOYMENT
        data_type: VARCHAR(32)
      - name: EARNING_ID
        data_type: VARCHAR(5000)
      - name: JOB_ID
        data_type: VARCHAR(5000)
      - name: LOCATION_ID
        data_type: VARCHAR(5000)
      - name: PAY_GROUP_ID
        data_type: VARCHAR(5000)
      - name: TAX_CALCULATION_GROUP_ID
        data_type: VARCHAR(5000)
      - name: TAX_CATEGORY_ID
        data_type: VARCHAR(5000)
      - name: TIME_CLOCK_CODE_ID
        data_type: VARCHAR(5000)
      - name: ACCRUAL_CODE
        data_type: VARCHAR(5000)
      - name: AMT_BASE
        data_type: NUMBER(38,17)
      - name: AMT_CURRENT
        data_type: NUMBER(38,17)
      - name: AMT_JOB_PREMIUM
        data_type: NUMBER(38,17)
      - name: AMT_YTD
        data_type: NUMBER(38,17)
      - name: AMT_YTD_SHIFT
        data_type: NUMBER(38,17)
      - name: BLN_INCLUDE_IN_DEFERRED_COMPENSATION
        data_type: BOOLEAN
      - name: BLN_INCLUDE_IN_DEFERRED_COMPENSATION_HOURS
        data_type: BOOLEAN
      - name: BLN_IS_VOIDED
        data_type: BOOLEAN
      - name: BLN_IS_VOIDING_RECORD
        data_type: BOOLEAN
      - name: BLN_USE_DEDUCTION_OFF_SET
        data_type: BOOLEAN
      - name: CALCULATION_RULE
        data_type: VARCHAR(5000)
      - name: CALCULATION_SEQUENCE
        data_type: NUMBER(38,0)
      - name: DTE_PAY
        data_type: TIMESTAMP_NTZ(9)
      - name: GEN_NUMBER
        data_type: VARCHAR(5000)
      - name: GL_FOLLOW_BASE_ACCOUNT_ALLOCATION
        data_type: VARCHAR(5000)
      - name: GROSS_UP
        data_type: VARCHAR(5000)
      - name: GROSS_UP_TARGET
        data_type: NUMBER(38,17)
      - name: GROSS_UP_TAX_CALCULATION_METHOD
        data_type: NUMBER(38,0)
      - name: HOURS_CURRENT
        data_type: NUMBER(38,17)
      - name: JOB_PREMIUM_RATE_OR_PERCENT
        data_type: NUMBER(38,17)
      - name: NUMBER_OF_DAYS
        data_type: NUMBER(38,0)
      - name: NUMBER_OF_GAMES
        data_type: NUMBER(38,0)
      - name: PAYOUT_RATE_TYPE
        data_type: VARCHAR(5000)
      - name: PERIOD_CONTROL
        data_type: NUMBER(38,0)
      - name: PIECE_COUNT
        data_type: NUMBER(38,17)
      - name: PROJECT
        data_type: VARCHAR(5000)
      - name: RATE_HOURLY_PAY
        data_type: NUMBER(38,17)
      - name: RATE_PAY
        data_type: NUMBER(38,17)
      - name: RATE_PERIOD_PAY
        data_type: NUMBER(38,17)
      - name: RATE_PIECE_PAY
        data_type: NUMBER(38,17)
      - name: REPORT_CATEGORY
        data_type: VARCHAR(5000)
      - name: TIP_CREDIT
        data_type: NUMBER(38,17)
      - name: TIP_GROSS_RECEIPTS
        data_type: NUMBER(38,17)
      - name: TIP_TYPE
        data_type: VARCHAR(5000)